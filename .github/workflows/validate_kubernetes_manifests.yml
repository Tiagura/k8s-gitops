name: Validate Kubernetes Manifests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Compute checkout depth
        id: depth
        run: |
          echo "depth=$((${{ github.event.pull_request.commits }} + 2))" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: ${{ steps.depth.outputs.depth }}
          fetch-tags: false
          filter: blob:none

      - name: Check for changes
        id: check-changes
        uses: ./.github/actions/changed-paths
        with:
          paths: infrastructure/ monitoring/ user-apps/
          checkout-depth: ${{ steps.depth.outputs.depth }}

      - name: Setup kubectl
        if: steps.check-changes.outputs.changed == 'true'
        uses: azure/setup-kubectl@15650b3ad78fff148532a140b8a4c821796b2d7b # v5.0.0

      - name: Setup Helm
        if: steps.check-changes.outputs.changed == 'true'
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Render all Kustomize manifests
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail

          mapfile -t dirs < <(
            find infrastructure monitoring user-apps \
              -type f -name kustomization.yaml \
              -exec dirname {} \; | sort -u
          )

          if [ "${#dirs[@]}" -eq 0 ]; then
            echo "No kustomization directories found."
            exit 1
          fi

          : > /tmp/all-manifests.yaml

          for dir in "${dirs[@]}"; do
            echo "Rendering ${dir}"
            kubectl kustomize --enable-helm "${dir}" >> /tmp/all-manifests.yaml
            echo "---" >> /tmp/all-manifests.yaml
          done

          if [ ! -s /tmp/all-manifests.yaml ]; then
            echo "ERROR: No manifests rendered"
            exit 1
          fi

          echo "Splitting manifests..."

          csplit -z -f /tmp/doc- /tmp/all-manifests.yaml '/^---$/' '{*}' >/dev/null || true

          # ALWAYS reset output file
          : > /tmp/filtered-manifests.yaml

          for f in /tmp/doc-*; do
            [ -f "$f" ] || continue
            cat "$f" >> /tmp/filtered-manifests.yaml
          done

      - name: Install kubeconform
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail

          echo "Fetching latest kubeconform version..."

          VERSION=$(curl -s https://api.github.com/repos/yannh/kubeconform/releases/latest \
            | grep '"tag_name":' \
            | cut -d '"' -f 4)

          echo "Latest version: $VERSION"

          URL="https://github.com/yannh/kubeconform/releases/download/${VERSION}/kubeconform-linux-amd64.tar.gz"

          curl -sSL -o /tmp/kubeconform.tar.gz "$URL"

          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform

          echo "Installed version:"
          kubeconform -v

      - name: Validate Kubernetes manifests
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail

          kubeconform \
            -summary \
            -strict \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json \
            /tmp/filtered-manifests.yaml