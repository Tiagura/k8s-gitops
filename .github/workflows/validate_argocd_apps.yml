name: Validate ArgoCD app structure

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Compute checkout depth
        id: depth
        run: |
          echo "depth=$((${{ github.event.pull_request.commits }} + 2))" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: ${{ steps.depth.outputs.depth }}
          fetch-tags: false
          filter: blob:none

      - name: Check for changes
        id: check-changes
        uses: ./.github/actions/changed-paths
        with:
          paths: infrastructure/controllers/argocd/apps/
          checkout-depth: ${{ steps.depth.outputs.depth }}

      - name: Validate ArgoCD app topology
        if: steps.check-changes.outputs.changed == 'true'
        run: bash ./scripts/validate_argocd_apps.sh