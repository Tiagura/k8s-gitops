on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  validate-argocd-apps:
    name: Validate ArgoCD app structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate ArgoCD app topology
        run: bash ./scripts/validate_argocd_apps.sh