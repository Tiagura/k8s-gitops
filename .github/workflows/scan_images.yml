name: Scan images for vulnerabilities

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Get changed YAML files
        id: check-changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$GITHUB_REPOSITORY/compare/$BASE_SHA...$HEAD_SHA \
            | jq -r '.files[].filename' \
            | grep -E '\.ya?ml$' \
            > /tmp/changed-files.txt || true

          echo "Changed yaml files:"

          if [ -s /tmp/changed-files.txt ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changed YAML files:"
            cat /tmp/changed-files.txt
          else
          echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No YAML changes detected."
          fi

      - name: Setup kubectl
        if: steps.check-changes.outputs.changed == 'true'
        uses: azure/setup-kubectl@15650b3ad78fff148532a140b8a4c821796b2d7b # v5.0.0

      - name: Setup Helm
        if: steps.check-changes.outputs.changed == 'true'
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Install yq
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install Trivy (latest)
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail

          for i in {1..5}; do
            echo "Fetching Trivy version (attempt $i/5)..."
              TRIVY_VERSION=$(curl -s https://api.github.com/repos/aquasecurity/trivy/releases/latest \
                | grep tag_name | cut -d '"' -f 4)

              # Check if we got a valid version string (e.g., v0.35.0)
              if [[ "$TRIVY_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "Latest Trivy version: $TRIVY_VERSION"
                break
              else
                echo "Failed to fetch valid Trivy version. Retrying in 5 seconds..."
                sleep 5
              fi
          done
          
          echo "Installing Trivy ${TRIVY_VERSION}"
          wget -qO /tmp/trivy.deb \
            https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/trivy_${TRIVY_VERSION#v}_Linux-64bit.deb

          sudo dpkg -i /tmp/trivy.deb
          trivy version

      - name: Extract images from YAML and rendered Helm charts
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail

          extract_images() {
            local file="$1"

            yq eval '
              .spec.template.spec.containers[].image,
              .spec.template.spec.initContainers[].image,
              .spec.jobTemplate.spec.template.spec.containers[].image,
              .spec.jobTemplate.spec.template.spec.initContainers[].image,
              .spec.containers[].image,
              .spec.initContainers[].image
            ' "$file" 2>/dev/null \
              | grep -v '^---$' \
              | sed '/^null$/d' \
              | sed '/^$/d'
          }

          : > /tmp/all-images.txt

          while read -r file; do
            [ -f "$file" ] || continue

            echo "------------------------------------"
            echo "Processing: $file"
            echo "------------------------------------"

            #
            # 1. Extract images directly from YAML
            #
            extract_images "$file" >> /tmp/all-images.txt || true

            #
            # 2. Render helm charts from kustomizations
            #
            filename="$(basename "$file")"

            if [[ "$filename" =~ ^kustomization\.ya?ml$ ]]; then

              helm_count=$(
                yq eval '.helmCharts | length' "$file" 2>/dev/null || echo 0
              )

              if [[ "$helm_count" != "0" && "$helm_count" != "null" ]]; then
                echo "Helm charts detected in $file"

                workdir="$(dirname "$file")"
                rendered="/tmp/rendered-$(basename "$workdir").yaml"

                echo "Rendering kustomization with Helm support..."

                kubectl kustomize "$workdir" \
                  --enable-helm \
                  > "$rendered"

                echo "Extracting images from rendered manifests..."

                extract_images "$rendered" >> /tmp/all-images.txt || true
              fi
            fi

          done < /tmp/changed-files.txt

          sort -u /tmp/all-images.txt > /tmp/images.txt

          echo "===================================="
          echo "Images detected:"
          echo "===================================="

          if [ ! -s /tmp/images.txt ]; then
            echo "No images found"
            exit 0
          fi

          cat /tmp/images.txt

      - name: Create Trivy ignore file
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          cat > .trivyignore <<'EOF'
          CVE-2026-31789
          EOF

          echo "Ignoring vulnerabilities:"
          cat .trivyignore

      - name: Scan images with Trivy
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail

          if [ ! -s /tmp/images.txt ]; then
            echo "No images to scan"
            exit 0
          fi

          while read -r image; do
            echo "===================================="
            echo "Scanning: $image"
            echo "===================================="

            trivy image \
              --severity CRITICAL \
              --pkg-types os,library \
              --ignore-unfixed \
              --ignorefile .trivyignore \
              --no-progress \
              --exit-code 1 \
              "$image"

          done < /tmp/images.txt