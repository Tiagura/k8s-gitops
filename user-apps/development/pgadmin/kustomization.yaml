apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: pgadmin
labels:
  - pairs:
      app.kubernetes.io/name: pgadmin
      app.kubernetes.io/component: database-admin
      app.kubernetes.io/part-of: management
      app.kubernetes.io/managed-by: argocd
    
resources:
  - namespace.yaml
  - pvc.yaml
  - pg-admin-secret-sealed.yaml
  - deployment.yaml
  - service.yaml
  - http-route.yaml
  - egress-to-cnpg-db.yaml
  - ../../../base/cilium-network-policies/