apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
    
labels:
  - pairs:
      app.kubernetes.io/name: gotenberg
      app.kubernetes.io/component: document-converter
      app.kubernetes.io/part-of: paperless

helmCharts:
  - name: gotenberg
    repo: https://maikumori.github.io/helm-charts
    version: 1.19.1
    releaseName: "gotenberg"
    namespace: paperless
    valuesFile: values.yaml

patches:
  - patch: |
      $patch: delete
      apiVersion: v1
      kind: Pod
      metadata:
        name: gotenberg-test-connection