apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fireflyiii-upload
  labels:
    app: fireflyiii
    tier: core
    recurring-job.longhorn.io/source: enabled
    recurring-job-group.longhorn.io/important: enabled
    recurring-job-group.longhorn.io/default: disabled
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi