apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: internal-selfsigned-cluster-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: internal-selfsigned-ca
spec:
  isCA: true
  commonName: internal-selfsigned-ca
  secretName: internal-selfsigned-ca-keypair
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: internal-selfsigned-cluster-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: internal-cluster-issuer
spec:
  ca:
    secretName: internal-selfsigned-ca-keypair