apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  labels:
    app: external-dns
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
        netpol.cilium.io/egress-to-cloudflare: "true"
        netpol.cilium.io/egress-to-kube-apiserver: "true"
        netpol.cilium.io/egress-to-kube-dns: "true"
        netpol.cilium.io/ingress-deny: "true"
    spec:
      serviceAccountName: external-dns
      priorityClassName: platform-critical
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.21.0
          args:
            # Gateway API sources
            - --source=gateway-httproute
            # - --source=gateway-grpcroute
            # - --source=gateway-tlsroute

            # Experimental Gateway API CRDs
            # - --source=gateway-tcproute
            # - --source=gateway-udproute

            # Label filter for gateways
            - --gateway-label-filter=app=gateway-external
            # Label filter for HTTPRoutes
            # - --label-filter=external-dns/enabled=true

            # Cloudflare settings
            - --domain-filter=tamhomelab.com
            - --provider=cloudflare
            - --cloudflare-proxied
            - --cloudflare-dns-records-per-page=5000
            - --cloudflare-record-comment=provisioned-by-external-dns
            - --registry=txt
            - --txt-owner-id=my-cluster

            # policy flag to control lifecycle behaviour of DNS records
            - --policy=sync
          envFrom:
            - secretRef:
                name: external-dns-secret
          ports:
            - name: http
              containerPort: 7979
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
            successThreshold: 1