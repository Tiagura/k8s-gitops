apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: fireflyiii-database
  labels:
    app: fireflyiii
  annotations:
    # Use this annotation to skip the empty WAL archive check during recovery
    # useful when the restoring cluster name is equal to the source cluster name
    # careful when using this annotation, as it may lead to data loss
    # use only when bootstrapping not with initdb
    # Issue: https://github.com/cloudnative-pg/plugin-barman-cloud/issues/683
    cnpg.io/skipEmptyWalArchiveCheck: "enabled" 
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3
  plugins:
  - name: barman-cloud.cloudnative-pg.io
    isWALArchiver: true
    parameters:
      barmanObjectName: barman-object-store
  postgresql:
    parameters:
      shared_buffers: "256MB"
      wal_compression: "on"
      max_wal_size: "512MB"
    pg_hba:
      - host fireflyiii fireflyiii 10.32.0.0/16 scram-sha-256   # Allow connections from the cluster network (i.e. Pod CIDR)
  # FIRST-TIME BOOTSTRAP (FROM INITDB)
  # bootstrap:
  #   initdb:
  #     database: fireflyiii
  #     owner: fireflyiii
  #     secret:
  #       name: fireflyiii-db-creds  
  # ---
  # BOOTSTRAP FROM BACKUP  
  bootstrap:
    recovery:
      source: fireflyiii-backup
      database: fireflyiii
      owner: fireflyiii
      secret:
        name: fireflyiii-db-creds
  externalClusters:
    - name: fireflyiii-backup
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: barman-object-store
          serverName: fireflyiii-database
  # ---
  storage:
    size: 5Gi
    storageClass: cnpg-longhorn-storage
  walStorage:
    size: 1Gi
    storageClass: cnpg-longhorn-storage