apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  labels:
    release: kube-prometheus-stack
    prometheus: kube-prometheus-stack-prometheus
  name: cnpg-db-metrics-monitor
spec:
  namespaceSelector:
    matchNames:
      - cloudnative-pg
  podMetricsEndpoints:
  - port: metrics
  selector:
    matchExpressions:
      - key: cnpg.io/cluster
        operator: Exists