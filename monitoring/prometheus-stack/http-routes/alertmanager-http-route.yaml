apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alertmanager
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Monitoring
    gethomepage.dev/name: Alertmanager
    gethomepage.dev/icon: https://raw.githubusercontent.com/prometheus/alertmanager/refs/heads/main/ui/app/public/favicon.ico
    gethomepage.dev/href: https://alertmanager.tamhomelab.com
    gethomepage.dev/description: "Alerting Management & Handling"
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=alertmanager"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway-internal
      namespace: gateway
  hostnames:
    - alertmanager.tamhomelab.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: kube-prometheus-stack-alertmanager
          port: 9093
          weight: 1