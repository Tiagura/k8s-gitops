apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: default-scheduled-backup
spec:
  cluster:
    name: change_me
  # immediate: true                 # Trigger an immediate backup upon creation
  schedule: '0 0 2 */3 * *'       # Every 3 days at 2:00 AM, GO cron format
  backupOwnerReference: self
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io